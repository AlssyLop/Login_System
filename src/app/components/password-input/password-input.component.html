<div class="input-wrapper">
    <ion-label class="input-label">{{ label }}</ion-label>
    <div class="input-container">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input [type]="type" [placeholder]="placeholder" [value]="value"
            [disabled]="isDisabled" (ionInput)="handleInputChange($event)" class="custom-input">
        </ion-input>
        <ion-button fill="clear" (click)="togglePasswordVisibility()" class="visibility-toggle">
            <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
    </div>
</div>
