<ion-content [fullscreen]="true">
  <div class="page-container animate-fade-in">
    <div class="background-overlay"></div>

    <div class="content-wrapper">
      <app-back-button link="/auth-home"></app-back-button>

      <div class="header-section">
        <h1 class="display-font">Welcome Back</h1>
        <p>Sign in to continue your secure journey.</p>
      </div>

      <div class="glass-card form-section">
        <form [formGroup]="loginForm">
          <app-email-input formControlName="email" label="Email Address"
            placeholder="Enter your email"></app-email-input>

          <app-password-input formControlName="password" label="Password"
            placeholder="Enter your password"></app-password-input>

          <div class="forgot-wrapper">
            <ion-button fill="clear" routerLink="/forgot" size="small" class="forgot-btn">
              Forgot password?
            </ion-button>
          </div>

          <div class="submit-wrapper">
            <app-button label="Sign In" link="/home" ></app-button>
          </div>
        </form>
      </div>

      <div class="footer-link">
        <span>Don't have an account?</span>
        <ion-button fill="clear" routerLink="/register" class="link-button">
          Sign Up
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
