<ion-content [fullscreen]="true">
  <div class="hero-container animate-fade-in">
    <div class="background-overlay"></div>

    <div class="content-wrapper">
      <div class="logo-section">
        <div class="logo-icon">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <h1 class="display-font">LuxeAuth</h1>
        <p class="subtitle">Elevating your digital security with elegance.</p>
      </div>

      <div class="glass-card action-section">
        <h2 class="display-font">Welcome</h2>
        <p>Expertly crafted authentication for the modern era.</p>

        <div class="button-group">
          <app-button label="Sign In" link="/login"></app-button>
          <div class="divider">
            <span>or</span>
          </div>
          <app-button label="Create Account" link="/register" class="outline-btn"></app-button>
        </div>
      </div>
    </div>
  </div>
</ion-content>
